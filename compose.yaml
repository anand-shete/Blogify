services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      - mongo
      - redis
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URI: http://localhost:3000/api/v1
    depends_on:
      - backend
    ports:
      - "4173:80"
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data: